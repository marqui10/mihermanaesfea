<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasapalabra Enfermeria</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #243b55;
            --success: #27ae60;
            --warning: #f39c12;
            --error: #c0392b;
            --bg: #f4f7f9;
            --text: #2c3e50;
            --gray-light: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            overflow: hidden;
        }

        /* Pantalla de Inicio */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; color: white; text-align: center;
        }
        .start-btn {
            background: var(--success); color: white; border: none;
            padding: 20px 50px; font-size: 1.5rem; font-weight: 800;
            border-radius: 50px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-top: 20px;
        }
        .start-btn:hover { transform: scale(1.1); background: #2ecc71; }

        .game-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 95%; max-width: 1000px;
            display: flex; gap: 40px; align-items: center;
            position: relative;
        }

        .pdf-btn {
            position: absolute; top: 20px; right: 20px;
            background: var(--primary); color: white; border: none;
            padding: 10px 18px; border-radius: 10px; cursor: pointer; 
            font-weight: 700; font-size: 0.75rem; box-shadow: 0 4px 10px rgba(26, 42, 108, 0.2);
            transition: 0.3s; text-transform: uppercase; z-index: 100;
        }

        .rosco-section { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .rosco-wrapper { position: relative; width: 380px; height: 380px; margin-top: 20px; }
        
        .letra-circulo {
            position: absolute; width: 32px; height: 32px;
            background: white; color: var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; border: 2px solid var(--gray-light);
            transition: all 0.3s ease;
        }

        .active { background: var(--primary); color: white; transform: scale(1.3); z-index: 10; border-color: var(--primary); }
        .success { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .error { background: var(--error) !important; color: white !important; border-color: var(--error) !important; }

        .timer-container {
            width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            position: relative; margin-top: 20px;
        }
        .timer-svg { transform: rotate(-90deg); width: 90px; height: 90px; }
        .timer-circle-bg { fill: none; stroke: var(--gray-light); stroke-width: 5; }
        .timer-circle-prog { 
            fill: none; stroke: var(--success); stroke-width: 5; 
            stroke-dasharray: 251.3; stroke-dashoffset: 0; 
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
            stroke-linecap: round;
        }
        .timer-text { position: absolute; font-weight: 900; color: var(--text); font-size: 1.4rem; transition: 0.2s; }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.2); color: var(--error); }
            100% { opacity: 1; transform: scale(1); }
        }
        .blink-critical { animation: blink 0.5s infinite; color: var(--error) !important; }

        .content-section { flex: 1.2; }
        .info-panel {
            background: #fff; border-radius: 20px; padding: 25px; margin-bottom: 20px;
            border: 1px solid #f0f4f8; text-align: center;
        }
        #item-img {
            width: 100%; height: 210px; object-fit: contain;
            background-color: #f8fafc; border-radius: 12px; cursor: zoom-in;
        }

        .audio-container { position: relative; width: 75px; height: 75px; margin: 15px auto; cursor: pointer; }
        .progress-ring__circle { transition: stroke-dashoffset 0.1s; transform-origin: 50% 50%; stroke: var(--primary); }
        .play-pause-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 22px; height: 22px; fill: var(--primary); pointer-events: none;
        }
        #icon-pause { display: none; }
        .playing #icon-play { display: none; }
        .playing #icon-pause { display: block; }

        input[type="text"] { width: 100%; padding: 16px; font-size: 1.1rem; border: 2px solid #edf2f7; border-radius: 14px; margin-bottom: 15px; text-align: center; }
        .btns-action { display: flex; gap: 12px; }
        button.action { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-send { background: var(--primary); color: white; }
        .btn-skip { background: var(--gray-light); }

        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1>PASAPALABRA</h1>
    <p>Haz clic en el botón para iniciar el tiempo y el audio.</p>
    <button class="start-btn" onclick="comenzarJuego()">¡COMENZAR!</button>
</div>

<div id="image-modal" class="modal" onclick="closeModal()">
    <img id="modal-content" src="">
</div>

<div class="game-container">
    <button class="pdf-btn" onclick="descargarSoluciones()">📥 PDF RESULTADO</button>

    <div class="rosco-section">
        <div class="rosco-wrapper" id="rosco"></div>
        <div class="timer-container">
            <svg class="timer-svg">
                <circle class="timer-circle-bg" r="40" cx="45" cy="45"></circle>
                <circle id="timer-prog" class="timer-circle-prog" r="40" cx="45" cy="45"></circle>
            </svg>
            <div class="timer-text" id="timer-num">15</div>
        </div>
    </div>

    <div class="content-section" id="ui-juego">
        <div class="info-panel">
            <span id="pista-texto" style="background:#ebf1ff; padding:5px 15px; border-radius:50px; font-size:0.75rem; font-weight:800; color:var(--primary)">ESPERANDO...</span>
            <h3 id="definicion-texto" style="margin: 15px 0;"></h3>
            <img id="item-img" src="" alt="Pista" onclick="openModal(this.src)">
            <audio id="audio-player"></audio>
            <div class="audio-container" id="audio-btn-container" onclick="toggleAudio()">
                <svg width="75" height="75">
                    <circle stroke="#e2e8f0" stroke-width="4" fill="transparent" r="34" cx="37.5" cy="37.5"/>
                    <circle id="audio-progress" class="progress-ring__circle" stroke-width="4" stroke-dasharray="213.6" stroke-dashoffset="213.6" stroke-linecap="round" fill="transparent" r="34" cx="37.5" cy="37.5"/>
                </svg>
                <div class="play-pause-icon">
                    <svg viewBox="0 0 24 24" id="icon-play"><path d="M8 5v14l11-7z"/></svg>
                    <svg viewBox="0 0 24 24" id="icon-pause"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
            </div>
        </div>
        <input type="text" id="user-input" placeholder="Escribe aquí..." autocomplete="off">
        <div class="btns-action">
            <button class="action btn-send" onclick="comprobar()">Validar</button>
            <button class="action btn-skip" onclick="pasar()">Pasapalabra</button>
        </div>
    </div>

    <div id="ui-final" style="display:none; text-align:center; flex:1.2;">
        <h2>Fin del Juego</h2>
        <div id="score" style="font-size:5rem; font-weight:900; color:var(--success);">0</div>
        <button onclick="location.reload()" class="action btn-send" style="width:100%;">Reiniciar</button>
    </div>
</div>

<script>
    const TIME_LIMIT = 20;
    const CIRC_AUDIO = 2 * Math.PI * 34;
    const preguntasBase = [   
        { letra: 'A', tipo: 'empieza', palabra: 'Asfixia', def: 'Dificultad para respirar debido obstrucción de la garganta o tráquea por un objeto.' },
        { letra: 'B', tipo: 'empieza', palabra: 'Botiquin', def: 'Conjunto de medicamentos y materiales para atender lesiones y emergencias.' },
        { letra: 'C', tipo: 'empieza', palabra: 'Corazón', def: 'Órgano central del sistema circulatorio encargado de impulsar la sangre por todo el organismo.' },
        { letra: 'D', tipo: 'empieza', palabra: 'Desfibrilación', def: 'Descarga eléctrica que se aplica para restablecer el ritmo cardiaco normal.' },
        { letra: 'E', tipo: 'empieza', palabra: 'Emergencias', def: 'Situaciones clínicas que requieren actuación rápida y coordinada.' },
        { letra: 'F', tipo: 'empieza', palabra: 'Fármaco', def: 'Sustancia utilizada para prevenir, diagnosticar o tratar los síntomas de una enfermedad o afección.' },
        { letra: 'G', tipo: 'empieza', palabra: 'Gasa', def: 'Compresa estéril que absorbe fluidos y protege la herida.' },
        { letra: 'H', tipo: 'empieza', palabra: 'Hemorragia', def: 'Flujo de sangre por rotura de vasos sanguíneos.' },
        { letra: 'I', tipo: 'empieza', palabra: 'Intoxicación', def: 'Reacción del organismo ante la entrada de una sustancia tóxica en el organismo que causa lesión, enfermedad o la muerte' },
        { letra: 'J', tipo: 'empieza', palabra: 'Jeringa', def: 'Tubo pequeño y hueco para inyectar o extraer líquidos.' },
        { letra: 'K', tipo: 'empieza', palabra: 'Ketamina', def: 'Medicamento anestésico de rápida acción utilizado para procedimientos quirúrgicos menores.' },
        { letra: 'L', tipo: 'empieza', palabra: 'Lavado', def: 'Limpieza de un órgano, una cavidad corporal o una herida al enjuagarlos con un líquido.' },
        { letra: 'M', tipo: 'empieza', palabra: 'Movilización', def: 'Conjunto de técnicas y actividades manuales o asistidas destinadas a cambiar de posición, trasladar o ayudar a caminar a pacientes con limitaciones de movilidad.' },
        { letra: 'N', tipo: 'empieza', palabra: 'Necrosis', def: 'Proceso patológico caracterizado por la muerte de células y tejidos en un organismo vivo' },
        { letra: 'Ñ', tipo: 'contiene', palabra: 'Riñón', def: 'Órgano excretor, generalmente en número par, que se encarga de filtrar la sangre para eliminar los residuos del metabolismo en forma de orina' },
        { letra: 'O', tipo: 'empieza', palabra: 'Oxígeno', def: 'Elemento químico gaseoso esencial para la respiración que constituye aproximadamente el 21% de la atmósfera terrestre.' },
        { letra: 'P', tipo: 'empieza', palabra: ['Paro', 'Parada'], def: 'Fallo súbito de la actividad circulatoria y/o respiratoria.' },
        { letra: 'Q', tipo: 'empieza', palabra: 'Quemadura', def: 'Lesión de piel y tejidos por calor, llamas, sustancias químicas o radiación.' },
        { letra: 'R', tipo: 'empieza', palabra: 'Reanimación', def: 'Conjunto de medidas terapéuticas que se aplican para recuperar o mantener las constantes vitales del organismo' },
        { letra: 'S', tipo: 'empieza', palabra: 'Síncope', def: 'Pérdida repentina y temporal de la consciencia y del tono postural caracterizada por una recuperación rápida y completa.' },
        { letra: 'T', tipo: 'empieza', palabra: 'Traumatismo', def: 'Lesión física o daño en los tejidos u órganos causado por una fuerza o impacto externo como caídas, accidentes o golpes' },
        { letra: 'U', tipo: 'empieza', palabra: 'Urgencia', def: 'Situación patológica que requiere de atención médica rápida aunque no necesariamente inmediata, ya que no representa riesgo inminente de muerte pero sí puede evolucionar a complicaciones graves.'},
        { letra: 'V', tipo: 'empieza', palabra: 'Vendaje', def: 'Protección y contención de una posible herida mediante tela o material adecuado.' },
        { letra: 'W', tipo: 'empieza', palabra: 'Warfarina', def: 'Anticoagulante oral que ayuda a prevenir la formación de coágulos sanguíneos' },
        { letra: 'X', tipo: 'contiene', palabra: 'Luxación', def: 'Desplazamiento de una articulación que requiere realineación y apoyo.' },
        { letra: 'Y', tipo: 'contiene', palabra: 'Escayola', def: 'Vendaje rígido utilizado para inmovilizar de forma total y estricta huesos fracturados, cubriendo articulaciones superiores e inferiores a la lesión' },
        { letra: 'Z', tipo: 'empieza', palabra: 'zoonosis', def: 'Enfermedades infecciosas transmisibles de animales a humanos, relevantes en el contexto de mordeduras o arañazos.' },
    ];

    let pendientes = [...preguntasBase], aciertos = 0, currentIdx = 0, timerInterval, timeLeft = TIME_LIMIT;
    const player = document.getElementById('audio-player'), btnContainer = document.getElementById('audio-btn-container');
    const audioProgress = document.getElementById('audio-progress'), timerNum = document.getElementById('timer-num'), timerProg = document.getElementById('timer-prog');

    function init() {
        const rosco = document.getElementById('rosco');
        preguntasBase.forEach((p, i) => {
            const dot = document.createElement('div');
            dot.className = 'letra-circulo'; dot.id = `dot-${p.letra}`; dot.innerText = p.letra;
            const angle = (i * (360 / 27) - 90) * (Math.PI / 180);
            dot.style.left = `${190 + 170 * Math.cos(angle) - 16}px`;
            dot.style.top = `${190 + 170 * Math.sin(angle) - 16}px`;
            rosco.appendChild(dot);
        });
        player.onended = () => resetAudioUI();
        player.ontimeupdate = updateAudioProgress;
        
        // Preparamos la UI de la letra A, pero todo congelado
        const data = pendientes[currentIdx];
        document.getElementById(`dot-${data.letra}`).classList.add('active');
        document.getElementById('pista-texto').innerText = `${data.tipo === 'empieza' ? 'Empieza por' : 'Contiene'} la ${data.letra}`;
        document.getElementById('definicion-texto').innerText = data.def;
        document.getElementById('item-img').src = `imagen/imagen${data.letra}.png`;
        player.src = `audio/audio${data.letra}.oga`;
        player.load();
    }

    function comenzarJuego() {
        document.getElementById('welcome-screen').style.display = 'none';
        render(); // Llama al render que arranca tiempo y audio
    }

    function render() {
        if (pendientes.length === 0) return end();
        const data = pendientes[currentIdx];
        document.querySelectorAll('.letra-circulo').forEach(d => d.classList.remove('active'));
        document.getElementById(`dot-${data.letra}`).classList.add('active');
        document.getElementById('pista-texto').innerText = `${data.tipo === 'empieza' ? 'Empieza por' : 'Contiene'} la ${data.letra}`;
        document.getElementById('definicion-texto').innerText = data.def;
        document.getElementById('item-img').src = `imagen/imagen${data.letra}.png`;
        
        player.src = `audio/audio${data.letra}.oga`; 
        player.load();
        
        // Ahora el audio suena SIEMPRE porque el usuario ya pulsó "Comenzar"
        player.play();
        btnContainer.classList.add('playing');
        
        document.getElementById('user-input').value = ''; 
        document.getElementById('user-input').focus();
        startTimer();
    }

    function toggleAudio() { if (player.paused) { player.play(); btnContainer.classList.add('playing'); } else { player.pause(); btnContainer.classList.remove('playing'); } }
    function updateAudioProgress() { if (player.duration) { const pct = player.currentTime / player.duration; audioProgress.style.strokeDashoffset = CIRC_AUDIO - (pct * CIRC_AUDIO); } }
    function resetAudioUI() { btnContainer.classList.remove('playing'); audioProgress.style.strokeDashoffset = CIRC_AUDIO; }

    function startTimer() {
        clearInterval(timerInterval); timeLeft = TIME_LIMIT;
        timerNum.classList.remove('blink-critical'); updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft--; updateTimerUI();
            if (timeLeft <= 5) timerNum.classList.add('blink-critical');
            if (timeLeft <= 0) { clearInterval(timerInterval); timeoutFail(); }
        }, 1000);
    }

    function updateTimerUI() {
        timerNum.innerText = timeLeft;
        const offset = 251.3 - (timeLeft / TIME_LIMIT) * 251.3;
        timerProg.style.strokeDashoffset = offset;
        if (timeLeft > 10) timerProg.style.stroke = "var(--success)";
        else if (timeLeft > 5) timerProg.style.stroke = "var(--warning)";
        else timerProg.style.stroke = "var(--error)";
    }

    function timeoutFail() { document.getElementById(`dot-${pendientes[currentIdx].letra}`).classList.add('error'); avanzar(); }
    
    function comprobar() {
        const input = document.getElementById('user-input').value.toLowerCase().trim();
        const data = pendientes[currentIdx];
        const norm = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const opciones = Array.isArray(data.palabra) ? data.palabra : [data.palabra];
        const esCorrecto = opciones.some(op => norm(input) === norm(op.toLowerCase().trim()));

        if (esCorrecto) { 
            document.getElementById(`dot-${data.letra}`).classList.add('success'); 
            aciertos++; 
        } else { 
            document.getElementById(`dot-${data.letra}`).classList.add('error'); 
        }
        avanzar();
    }

    function pasar() { clearInterval(timerInterval); player.pause(); currentIdx = (currentIdx + 1) % pendientes.length; render(); }
    
    function avanzar() { 
        clearInterval(timerInterval); player.pause(); 
        pendientes.splice(currentIdx, 1); 
        if (pendientes.length === 0) return end();
        if (currentIdx >= pendientes.length) currentIdx = 0; 
        render(); 
    }
    
    function end() { clearInterval(timerInterval); document.querySelector('.rosco-section').style.display = 'none'; document.getElementById('ui-juego').style.display = 'none'; document.getElementById('ui-final').style.display = 'block'; document.getElementById('score').innerText = aciertos; }
    function openModal(src) { const m = document.getElementById('image-modal'); document.getElementById('modal-content').src = src; m.style.display = "flex"; }
    function closeModal() { document.getElementById('image-modal').style.display = "none"; }

    function descargarSoluciones() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(26, 42, 108); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold"); doc.setFontSize(22);
        doc.text("REPORTE DE SOLUCIONES", 105, 20, { align: "center" });
        const rows = preguntasBase.map(p => {
            const txt = Array.isArray(p.palabra) ? p.palabra.join(" / ") : p.palabra;
            return [p.letra, p.tipo.toUpperCase(), txt.toUpperCase(), p.def];
        });
        doc.autoTable({
            head: [['Letra', 'Tipo', 'Palabra Correcta', 'Definición']],
            body: rows, startY: 50, theme: 'striped',
            headStyles: { fillColor: [26, 42, 108] },
            columnStyles: { 0: { cellWidth: 15 }, 2: { cellWidth: 35, fontStyle: 'bold' } }
        });
        doc.save("Reporte_Soluciones_Pasapalabra.pdf");
    }

    document.getElementById('user-input').addEventListener('keyup', (e) => { if(e.key === 'Enter') comprobar(); });
    init();
</script>
</body>
</html>
